<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주소 검색 결과</title>
</head>
<body>
  <p>주소를 불러오는 중...</p>
  <script>
    (function() {
      var qs = window.location.search || (window.location.hash ? window.location.hash.slice(1) : '');
      var p = new URLSearchParams(qs);
      var data = {
        zipCode: p.get('zipNo') || '',
        roadAddress: p.get('roadAddrPart1') || p.get('roadFullAddr') || '',
        jibunAddress: p.get('jibunAddr') || '',
        buildingName: p.get('bdNm') || '',
        detailAddress: p.get('addrDetail') || ''
      };
      var sent = false;
      var target = window.opener;
      if (!target) {
        try { target = window.open('', 'jusoOpener'); } catch (e) {}
      }
      if (target) {
        try {
          if (typeof target.jusoCallBack === 'function') {
            target.jusoCallBack(data);
            sent = true;
          } else {
            target.postMessage({ type: 'JUSO_CALLBACK', data: data }, '*');
            sent = true;
          }
        } catch (e) {}
      }
      if (!sent) {
        try {
          localStorage.setItem('juso_callback_data', JSON.stringify(data));
          localStorage.setItem('juso_callback_ts', String(Date.now()));
        } catch (e) {}
      }
      window.close();
    })();
  </script>
</body>
</html>
