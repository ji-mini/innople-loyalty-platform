services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env.prd
    environment:
      SPRING_PROFILES_ACTIVE: prd
      SERVER_PORT: "3201"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3201/api/v1/public/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: nginx/Dockerfile
    ports:
      - "8090:8090"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

