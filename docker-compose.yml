services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3201:3201"
    env_file:
      - .env.dev
    environment:
      SERVER_PORT: "3201"

  frontend:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    ports:
      - "3200:3200"
    environment:
      VITE_API_PROXY_TARGET: "http://backend:3201"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8090:8090"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

